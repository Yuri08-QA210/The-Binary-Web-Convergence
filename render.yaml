services:
  - type: web
    name: vaultvm-ctf
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install && npx prisma generate && npx prisma db push --accept-data-loss && npm run build
    startCommand: npm run start:render
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_SECRET_KEY
        sync: false
      - key: FLAG_1
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: vaultvm-db
          property: connectionString
      - key: DIRECT_URL
        fromDatabase:
          name: vaultvm-db
          property: connectionString

  - type: pserv
    name: vaultvm-db
    runtime: postgres
    plan: free
    region: oregon
    user: vaultvm_admin
    database: vaultvm
