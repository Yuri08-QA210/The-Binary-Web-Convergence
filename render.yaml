services:
  - type: web
    name: vaultvm-ctf
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_SECRET_KEY
        sync: false
      - key: FLAG_1
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: vaultvm-db
          property: connectionString
      - key: DIRECT_URL
        fromDatabase:
          name: vaultvm-db
          property: connectionString

databases:
  - name: vaultvm-db
    plan: free
    region: oregon
    user: vaultvm_admin
    database: vaultvm
